name: PlatformIO Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-firmware:
    name: Build firmware for ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env:
          - esp32dev
          - ttgo-lora32-v2
          - ttgo-lora32-v21
          - heltec-wireless-stick-v3
          - heltec-wifi-lora-32-v2
          - heltec-wifi-lora-32-v3
          - heltec-wifi-lora-32-v4
          - adafruit-feather-esp32
          - lilygo-t3-s3-sx1262
          - lilygo-t3-s3-sx1276
          - m5stack-core2
          - ttgo-lora32-v1
          - heltec-wireless-stick
          - heltec-wireless-stick-lite
          - adafruit-feather-esp32s2
          - seeed-xiao-esp32s3
          - lilygo-t3-s3-lr1121
          - esp32s3-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Verify PlatformIO
        run: pio --version

      - name: Build firmware
        run: |
          pio run -e ${{ matrix.env }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/firmware.*

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-firmware
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-artifacts

      - name: Prepare firmware files
        run: |
          mkdir -p release-files
          for dir in firmware-artifacts/firmware-*; do
            env_name=$(basename "$dir" | sed 's/firmware-//')
            for file in "$dir"/*; do
              [ -f "$file" ] && cp "$file" "release-files/$(basename "$file" .bin)_${env_name}.bin"
            done
          done

      - name: Create Release and Upload Firmware
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
