; --- LilyGo T3-S3 with SX1262 ---
[env:lilygo-t3-s3-sx1262]
platform = espressif32
board = lilygo-t3-s3
framework = arduino
monitor_speed = 115200
lib_deps =

    jgromes/RadioLib
    bblanchon/ArduinoJson
    tzapu/WiFiManager
    adafruit/Adafruit BMP280 Library
build_flags =
    -D ARDUINO_ESP32S3_DEV
    -D PIN_RECEIVER_CS=10
    -D PIN_RECEIVER_IRQ=21
    -D PIN_RECEIVER_RST=9
    -D PIN_RECEIVER_GPIO=8
    -D LORA_SCK=5
    -D LORA_MISO=19
    -D LORA_MOSI=23
    -D LORA_CS=10

