; PlatformIO Project Configuration File
; Bresser Weather Sensor to WU + APRS-IS Gateway
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ================================================================================================
; Default environment: Generic ESP32
; ================================================================================================
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =

    jgromes/RadioLib
    bblanchon/ArduinoJson
    tzapu/WiFiManager
    adafruit/Adafruit BMP280 Library

; ================================================================================================
; Board Variants - Select one below by uncommenting [env:] and using it as active environment
; ================================================================================================

; --- LILYGO TTGO LoRa32 V2 with SX1276 ---
[env:ttgo-lora32-v2]
platform = espressif32
board = ttgo-lora32-v2
framework = arduino
monitor_speed = 115200
lib_deps =

    jgromes/RadioLib
    bblanchon/ArduinoJson
    tzapu/WiFiManager
    adafruit/Adafruit BMP280 Library
build_flags =
    -D ARDUINO_TTGO_LoRa32_V2

; --- LILYGO TTGO LoRa32 V2.1 with SX1276 ---
[env:ttgo-lora32-v21]
