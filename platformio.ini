; PlatformIO Project Configuration File
; Bresser Weather Sensor to WU + APRS-IS Gateway
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ================================================================================================
; Default environment: Generic ESP32
; ================================================================================================
; ================================================================================================
; ESP32 Dev Board - Radio Module Variants
; Select the desired variant by using it as active environment
; ================================================================================================

; --- ESP32 Dev with SX1262 (LoRa) ---
[env:esp32dev-sx1262]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =

    jgromes/RadioLib
    bblanchon/ArduinoJson
    tzapu/WiFiManager
    adafruit/Adafruit BMP280 Library
    adafruit/Adafruit SSD1306
    knolleary/PubSubClient

build_flags =
    -D ESP32_VARIANT_SX1262

; --- ESP32 Dev test firmware with synthetic weather data ---
[env:esp32dev-test-weather]
